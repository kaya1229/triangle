<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
    #canvas-container { width: 100vw; height: 70vh; cursor: grab; }
    
    /* 컨트롤 패널 */
    #control-panel {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px; align-items: flex-end;
      background: rgba(20, 20, 20, 0.7); padding: 20px; border-radius: 50px;
    }

    /* 실루엣 버튼 공통 스타일 */
    .member-btn {
      cursor: pointer; filter: drop-shadow(0 5px 0 #333); transition: transform 0.1s;
      -webkit-user-drag: none;
    }
    .member-btn:active { transform: translateY(5px); filter: none; }

    /* 각 멤버 버튼 (배경 제거된 인물 사진 경로 입력) */
    #red-btn { height: 120px; }
    #green-btn { height: 120px; }
    #blue-btn { height: 120px; }

    /* 떼창 모드 - 로고 동그라미 버튼 */
    #chorus-btn {
      width: 80px; height: 80px; border-radius: 50%; background: #eee;
      border: 5px solid #555; display: flex; align-items: center; justify-content: center;
      box-shadow: inset 0 -4px 0 #999;
    }
    #chorus-btn img { width: 80%; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="control-panel">
    <img src="member_red.jpeg" id="red-btn" class="member-btn" title="빨강">
    <img src="member_green.png" id="green-btn" class="member-btn" title="초록">
    <img src="member_blue.png" id="blue-btn" class="member-btn" title="파랑">
    
    <div id="chorus-btn" class="member-btn">
      <img src="logo_only.png">
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
